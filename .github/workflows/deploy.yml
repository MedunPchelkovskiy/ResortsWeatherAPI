name: Deploy FastAPI

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/fastapi:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/fastapi:${{ github.sha }}

      - name: Deploy
        run: |
          az containerapp update \
            --name ${{ secrets.APP_NAME }} \
            --resource-group ${{ secrets.RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/fastapi:${{ github.sha }}